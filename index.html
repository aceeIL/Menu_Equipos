<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="faviconRDP.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Equipos</title>
    <style>
        :root {
            --bg: #050505;
            --red-main: #ff3e3e;
            --red-dim: #4a0000;
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: var(--text);
        }

        /* Efecto de rejilla de fondo */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 62, 62, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 62, 62, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .welcome-container {
            text-align: center;
            padding: 40px;
            border: 1px solid #222;
            background: #0a0a0a;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
        }

        /* Línea de escaneo animada */
        .welcome-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--red-main);
            box-shadow: 0 0 15px var(--red-main);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 5px;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--red-main);
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin-bottom: 40px;
            display: block;
        }

        .btn-enter {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--red-main);
            color: var(--red-main);
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-enter:hover {
            background: var(--red-main);
            color: white;
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
        }

        .status-info {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1></h1>
        <span class="subtitle">Menu principal</span>
        
        <!-- ENLACE A TU WEB PRINCIPAL -->
        <a href="Equipo.html" class="btn-enter">Checklist Nuevos Equipos</a>

        
    </div>

</body>
</html>
