<!DOCTYPE html>
<html lang="es">
<head>
	<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="icon" type="image/png" href="faviconRDP.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos Nuevos Checklist</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<div class="main-layout">

<header class="dashboard-header">
	<button class="export-btn excel" onclick="exportarExcel()">CSV</button>
    <div class="brand">
			<div class="global-progress">
			<div class="global-bar"></div>
			</div>
			<div class="global-text">0%</div>
        <span class="glitch-text">NUEVOS EQUIPOS</span>
        <div class="stats-bar">
		<div class="filter-box">
    <button onclick="filtrar('all')" class="filter-btn active" data-filter="all">TODOS</button>
	<button onclick="filtrar('pending')" class="filter-btn" data-filter="pending">PENDIENTES</button>
	<button onclick="filtrar('done')" class="filter-btn" data-filter="done">COMPLETOS</button>
	<button id="history-btn" class="btn-clean">HISTORIAL</button>
	<input type="text" id="search-input" placeholder="Buscar equipo...">

</div>
            PENDIENTES: <span id="count-pending">0</span> | LISTOS: <span id="count-done">0</span>
        </div>
    </div>

    <div class="header-actions">
        <div class="add-team-box">
            <input type="text" id="team-input" placeholder="Nombre del equipo...">
            <button id="add-btn" class="btn-add-inline">AÑADIR</button>
        </div>
				<!-- Boton Limpiar -->
        <button id="clean-btn" class="btn-clean" onclick="limpiarCompletados()">LIMPIAR TERMINADOS</button>
    </div>
</header>

<div class="table-frame">
<table id="equipos-table">
    <thead>
        <tr>
            <th>ID EQUIPO</th>
            <th>PROGRESO</th>
            <th>Actualizaciones</th>
            <th>Bios Update</th>
            <th>Cosas C:\</th>
            <th>Cuentas</th>
            <th>Aplicaciones</th>
            <th>Estado</th>
            <th>ELIMINAR</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>
</div>

<div class="global-notes-container">
    <div class="notes-header-flex">
        <div class="notes-header">NOTAS GENERALES</div>
        <button class="btn-date" onclick="insertarFecha()">INSERTAR FECHA</button>
    </div>

    <textarea id="global-notes" placeholder="Escribe aquí..."></textarea>

    <div class="notes-header" style="margin-top: 30px;">NOTAS POR EQUIPO</div>
    <div id="team-summary-list" class="summary-grid"></div>
</div>

</div>
<div id="history-modal" class="modal hidden">
  <div class="modal-content">
    <h3>Historial de Equipos</h3>
    <div id="history-list"></div>
    <div class="modal-actions">
  <button onclick="exportarHistorialTXT()">Exportar TXT</button>
  <button onclick="borrarHistorial()">Vaciar</button>
  <button onclick="cerrarHistorial()">Cerrar</button>
</div>
  </div>
</div>
<div id="edit-modal" class="modal hidden">
  <div class="modal-content">
    <h3>Editar Equipo</h3>

    <input type="text" id="edit-input" placeholder="Nombre del equipo">

    <div class="modal-actions">
      <button onclick="guardarEdicion()">Guardar</button>
      <button onclick="cerrarEditar()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const btnAdd = document.getElementById('add-btn');
const inputTeam = document.getElementById('team-input');
const tableBody = document.getElementById('table-body');
const summaryList = document.getElementById('team-summary-list');
const globalNotes = document.getElementById('global-notes');

let filtroActual = "all";

let filaEditando = null;

/* =========================
   CREAR EQUIPO
========================= */

function crearEquipo() {
    const nombre = inputTeam.value.trim().toUpperCase();
    if (!nombre) return;

    const existe = Array.from(document.querySelectorAll('.edit-name'))
        .some(i => i.value.trim().toUpperCase() === nombre);

    if (existe) {
        inputTeam.value = "";
        return;
    }

    const row = document.createElement('tr');
    row.dataset.id = crypto.randomUUID();
	row.dataset.locked = "false";

    row.innerHTML = `
        <td>
    <button class="edit-btn" onclick="abrirEditar(this)">✏️</button>
    <input type="text" class="edit-name" value="${nombre}" readonly>
		</td>
		
        <td>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <div class="progress-text">0%</div>
        </td>

        ${Array(5).fill().map(() => `
        <td>
            <label class="cb-red">
                <input type="checkbox" onchange="actualizarCheck(this)">
                <span></span>
            </label>
        </td>
        `).join("")}

        <td><button class="finish-btn" onclick="finalizarFila(this)">OK</button></td>
        <td><button class="delete-row-btn" onclick="eliminarFila(this)">X</button></td>

        <td style="display:none"><input class="hidden-notes"></td>
        <td style="display:none"><input type="checkbox" class="hidden-inv-check"></td>
    `;

    tableBody.appendChild(row);

    inputTeam.value = "";

    actualizarProgresoVisual(row);
    guardarDatos();
    actualizarResumenEquipos();
    actualizarContadores();
    actualizarBarraGlobal();
    ordenarPorProgreso();
    filtrar(filtroActual);
	guardarDatos();
	forzarGuardadoGlobal();
}

/* =========================
   CHECKS
========================= */

function actualizarCheck(input) {
    const row = input.closest('tr');

    actualizarProgresoVisual(row);
    ordenarPorProgreso();
    refrescarUI();

    guardarDatos();
	forzarGuardadoGlobal();
}


/* =========================
   PROGRESO
========================= */

function actualizarProgresoVisual(row) {
    const checks = row.querySelectorAll('td input[type="checkbox"]:not(.hidden-inv-check)');
    const bar = row.querySelector('.progress-bar');
    const text = row.querySelector('.progress-text');
    const btn = row.querySelector('.finish-btn');

    let done = 0;
    checks.forEach(c => { if (c.checked) done++; });

    const percent = Math.round((done / checks.length) * 100);

    const current = parseFloat(bar.style.width) || 0;
    animarBarra(bar, current, percent, 550);

    text.textContent = percent + "%";

    // animación
    bar.classList.remove("animate");
    void bar.offsetWidth;
    bar.classList.add("animate");

    // color verde al completar
    if (percent === 100) {
        bar.classList.add("full");

        btn.classList.add("ready-to-finish");
        btn.style.cursor = "pointer";

    } else {
        bar.classList.remove("full");

        btn.classList.remove("ready-to-finish");
        btn.style.cursor = "not-allowed";
    }

    actualizarEstado(row, percent);
}

/* =========================
   FINALIZAR
========================= */

function finalizarFila(btn) {
    if (!btn.classList.contains("ready-to-finish")) return;

    const row = btn.closest('tr');
    const isDone = row.classList.contains('row-finished');

    row.classList.toggle('row-finished');

    const finished = row.classList.contains('row-finished');

    const checks = row.querySelectorAll('td input[type="checkbox"]:not(.hidden-inv-check)');
    checks.forEach(c => c.disabled = finished);

    btn.textContent = finished ? "REABRIR" : "OK";

    row.dataset.state = finished ? "done" : "reopened";

    refrescarUI();

    if (!isDone && finished) {
        guardarEnHistorial(row);
		guardarDatos();
		forzarGuardadoGlobal();
    }
}

/* =========================
   ELIMINAR
========================= */

function eliminarFila(btn) {
  const row = btn.closest('tr');
  guardarEnHistorial(row);
  row.remove();
  refrescarUI();
  guardarDatos();
  forzarGuardadoGlobal();
}

/* =========================
   LIMPIAR
========================= */

function limpiarCompletados() {
    document.querySelectorAll('.row-finished').forEach(r => {
        guardarEnHistorial(r);
        r.remove();
    });

    refrescarUI();
}

/* =========================
   RESUMEN
========================= */

function actualizarResumenEquipos() {
    summaryList.innerHTML = "";

    document.querySelectorAll('#table-body tr').forEach(row => {

        const isDone = row.classList.contains("row-finished");

        if (
            (filtroActual === "pending" && isDone) ||
            (filtroActual === "done" && !isDone)
        ) {
            return; // no mostrar
        }

        const name = row.querySelector('.edit-name').value;
        const hiddenInv = row.querySelector('.hidden-inv-check');

        const card = document.createElement('div');
        card.className = "team-card";

        card.innerHTML = `
            <div class="card-header">${name}</div>
            <textarea class="card-textarea"></textarea>

            <div class="inv-row">
                <span>¿Inventariado?</span>
                <button class="inv-btn">${hiddenInv.checked ? "SI" : "NO"}</button>
            </div>
        `;

        const ta = card.querySelector('textarea');
        const btn = card.querySelector('.inv-btn');

        ta.value = row.querySelector('.hidden-notes').value;

        ta.oninput = () => {
            row.querySelector('.hidden-notes').value = ta.value;
            guardarDatos();
        };

        btn.onclick = () => {
            hiddenInv.checked = !hiddenInv.checked;
            btn.textContent = hiddenInv.checked ? "SI" : "NO";
            guardarDatos();
        };

        summaryList.appendChild(card);
    });
}

/* =========================
   STORAGE
========================= */

function guardarDatos() {
    const data = [];

    document.querySelectorAll('#table-body tr').forEach(row => {

        const checks = Array.from(
            row.querySelectorAll('td input[type="checkbox"]:not(.hidden-inv-check)')
        ).map(c => c.checked);

        const nameEl = row.querySelector('.edit-name');
        const notesEl = row.querySelector('.hidden-notes');
        const invEl = row.querySelector('.hidden-inv-check');

        if (!nameEl) return;

        data.push({
            id: row.dataset.id,
            name: nameEl.value || "",
            checks: checks,
            finished: row.classList.contains('row-finished'),
            state: row.dataset.state || "in-progress",
            notes: notesEl ? notesEl.value : "",
            inventariado: invEl ? invEl.checked : false
        });
    });

    console.log("GUARDANDO:", data);

    localStorage.setItem('techTrackTable', JSON.stringify(data));
	localStorage.setItem('techTrackNotes', globalNotes.value);
}

/* =========================
   AUTO GUARDADO NOTAS
========================= */

globalNotes.addEventListener("input", guardarDatos);

/* =========================
   Insertar Fecha
========================= */
function insertarFecha() {
    const ahora = new Date();

    const fecha = ahora.toLocaleDateString('es-ES');
    const hora = ahora.toLocaleTimeString('es-ES', {
        hour: '2-digit',
        minute: '2-digit'
    });

    const texto = `\n[${fecha} ${hora}] `;

    const start = globalNotes.selectionStart;
    const end = globalNotes.selectionEnd;

    const actual = globalNotes.value;

    globalNotes.value =
        actual.substring(0, start) +
        texto +
        actual.substring(end);

    globalNotes.focus();
    globalNotes.selectionStart = globalNotes.selectionEnd =
        start + texto.length;

    guardarDatos();
}
/* =========================
   CONTADORES
========================= */

function actualizarContadores() {
    const rows = Array.from(tableBody.querySelectorAll('tr'));

    let pending = 0;
    let done = 0;

    rows.forEach(r => {
        const state = r.dataset.state;
		console.log("Filas encontradas:", rows);
		
        if (state === "done") done++;
        else pending++;
    });

    document.getElementById('count-pending').textContent = pending;
    document.getElementById('count-done').textContent = done;
}

/* =========================
   Obtener %
========================= */

function obtenerPorcentaje(row) {
    const checks = row.querySelectorAll('td input[type="checkbox"]:not(.hidden-inv-check)');
    let done = 0;
    checks.forEach(c => { if (c.checked) done++; });
    return (done / checks.length) * 100;
}
/* =========================
   Obtener Score para añadir peso
========================= */
function obtenerScore(row) {
    const percent = obtenerPorcentaje(row);
    const isFinished = row.classList.contains('row-finished');

    return (percent * 2) + (isFinished ? 0 : 100);
}
/* =========================
   ORDEN por progreso (%)
========================= */
function ordenarPorProgreso() {
    const rows = Array.from(tableBody.querySelectorAll('tr'));

    rows.sort((a, b) => {
        return obtenerScore(b) - obtenerScore(a);
    });

    rows.forEach(r => tableBody.appendChild(r));
}



/* =========================
   FILTRO
========================= */

function filtrar(tipo) {
    filtroActual = tipo;

    //  actualizar botones 
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');

        if (btn.dataset.filter === tipo) {
            btn.classList.add('active');
        }
    });

    //  filtrar
    document.querySelectorAll('#table-body tr').forEach(row => {
        const isDone = row.classList.contains('row-finished');

        const show =
            tipo === "all" ||
            (tipo === "pending" && !isDone) ||
            (tipo === "done" && isDone);

        row.style.display = show ? "" : "none";
    });

    actualizarResumenEquipos();
}

/* =========================
   GLOBAL
========================= */

function actualizarBarraGlobal() {
    const rows = document.querySelectorAll('#table-body tr');

    let totalChecks = 0;
    let totalDone = 0;

    rows.forEach(row => {
        const checks = row.querySelectorAll('td input[type="checkbox"]:not(.hidden-inv-check)');

        totalChecks += checks.length;
        checks.forEach(c => { if (c.checked) totalDone++; });
    });

    const percent = totalChecks === 0 ? 0 : Math.round((totalDone / totalChecks) * 100);

    const bar = document.querySelector('.global-bar');
    const text = document.querySelector('.global-text');

    bar.style.width = percent + "%";
    bar.style.background = "var(--red-main)";
    text.textContent = percent + "%";
}

/* =========================
   CargarDatos
========================= */

function cargarDatos() {

    const data = JSON.parse(localStorage.getItem('techTrackTable') || "[]");
    const notes = localStorage.getItem('techTrackNotes');

    if (notes) globalNotes.value = notes;

    tableBody.innerHTML = "";

    data.forEach(item => {

        const row = document.createElement('tr');
        row.dataset.id = item.id;
        row.draggable = true;

        row.innerHTML = `
            <td>
                <button class="edit-btn" onclick="abrirEditar(this)">✏️</button>
                <input type="text" class="edit-name" value="${item.name}" readonly>
            </td>

            <td>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <div class="progress-text">0%</div>
            </td>

            ${item.checks.map(checked => `
                <td>
                    <label class="cb-red">
                        <input type="checkbox" ${checked ? "checked" : ""} onchange="actualizarCheck(this)">
                        <span></span>
                    </label>
                </td>
            `).join("")}

            <td><button class="finish-btn" onclick="finalizarFila(this)">OK</button></td>
            <td><button class="delete-row-btn" onclick="eliminarFila(this)">X</button></td>

            <td style="display:none"><input class="hidden-notes" value="${item.notes || ""}"></td>
            <td style="display:none"><input type="checkbox" class="hidden-inv-check" ${item.inventariado ? "checked" : ""}></td>
        `;

        tableBody.appendChild(row);

        if (item.finished) {
            row.classList.add("row-finished");

            row.querySelectorAll('input[type="checkbox"]:not(.hidden-inv-check)')
                .forEach(c => c.disabled = true);

            row.querySelector('.finish-btn').textContent = "REABRIR";
        }

        actualizarProgresoVisual(row);
    });

    actualizarResumenEquipos();
    actualizarContadores();
    actualizarBarraGlobal();
const savedOrder = JSON.parse(localStorage.getItem("techTrackOrder") || "[]");

if (savedOrder.length) {
    savedOrder.forEach(id => {
        const row = [...tableBody.querySelectorAll("tr")]
            .find(r => r.dataset.id === id);
        if (row) tableBody.appendChild(row);
    });
}
}

/* =========================
   INIT
========================= */

btnAdd.onclick = crearEquipo;

inputTeam.addEventListener("keydown", e => {
    if (e.key === "Enter") crearEquipo();
});

window.onload = cargarDatos;
/* =========================
   Actualizar Estado
========================= */

function actualizarEstado(row, percent) {
    let state = row.dataset.state || "in-progress";

    if (percent === 100 && state === "in-progress") {
        state = "ready"; // auto listo
    }

    row.dataset.state = state;

    row.classList.remove(
        "state-in-progress",
        "state-ready",
        "state-done",
        "state-reopened"
    );

    row.classList.add("state-" + state);
}
function animarBarra(bar, from, to, duration = 500) {
    const start = performance.now();

    function frame(time) {
        const progress = Math.min((time - start) / duration, 1);
        const value = from + (to - from) * progress;

        bar.style.width = value + "%";

        if (progress < 1) {
            requestAnimationFrame(frame);
        }
    }

    requestAnimationFrame(frame);
}
/* =========================
   Guardar en el historial
========================= */
function guardarEnHistorial(row) {
  const historial = JSON.parse(localStorage.getItem('techTrackHistory') || "[]");

  const id = row.dataset.id;

  const procesos = [
    "Actualizaciones",
    "BIOS Update",
    "Cosas C:\\",
    "Cuentas",
    "Aplicaciones"
  ];

  const checks = Array.from(
    row.querySelectorAll('td input[type="checkbox"]:not(.hidden-inv-check)')
  );

  const faltantes = [];

  checks.forEach((c, i) => {
    if (!c.checked) {
      faltantes.push(procesos[i] || `Proceso ${i + 1}`);
    }
  });

  const nuevo = {
    id: id,
    name: row.querySelector('.edit-name').value,
    fecha: new Date().toLocaleString(),
    progreso: obtenerPorcentaje(row),
    estado: row.dataset.state,
    inventariado: row.querySelector('.hidden-inv-check').checked,
    faltantes: faltantes
  };

  const index = historial.findIndex(h => h.id === id);

  if (index !== -1) {
    historial[index] = nuevo;
  } else {
    historial.push(nuevo);
  }

  localStorage.setItem('techTrackHistory', JSON.stringify(historial));
}

/* =========================
   AbrirHistorial
========================= */
function abrirHistorial() {
  const modal = document.getElementById('history-modal');
  const list = document.getElementById('history-list');

  const historial = JSON.parse(localStorage.getItem('techTrackHistory') || "[]");

  list.innerHTML = historial.length === 0 
    ? "<p style='color:#666'>Sin historial</p>" 
    : historial.slice().reverse().map(h => `
      <div class="history-item">
        <div class="history-name">${h.name}</div>
        <div class="history-meta">${h.fecha}</div>
        <div class="history-meta">
          ${h.progreso}% — ${h.estado}
        </div>
        <div class="history-meta">
          Inventario: 
          <span class="${h.inventariado ? 'inv-yes' : 'inv-no'}">
            ${h.inventariado ? 'SI' : 'NO'}
          </span>
        </div>
      </div>
    `).join("");

  modal.classList.remove('hidden');
}

/* =========================
Cerrar ventana historial
========================= */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    cerrarHistorial();
    cerrarEditar(); 
  }
});

document.getElementById('history-modal').addEventListener('click', (e) => {
  if (e.target.id === 'history-modal') {
    cerrarHistorial();
  }
});


/* =========================
   Cerrar historial
========================= */
function cerrarHistorial() {
  document.getElementById('history-modal').classList.add('hidden');
}
/* =========================
  Borrar Historial
========================= */
function borrarHistorial() {
  localStorage.removeItem('techTrackHistory');
  abrirHistorial();
}
/* =========================
  Evento Botón Historial
========================= */
document.getElementById('history-btn').onclick = abrirHistorial;
/* ======================================
  Funciones repetidas dentro de funciones
========================================= */
function refrescarUI() {
    guardarDatos();
    actualizarResumenEquipos();
    actualizarContadores();
    actualizarBarraGlobal();
    filtrar(filtroActual);
}
/* ======================================
  Funcionalidad de filtros
========================================= */
const searchInput = document.getElementById('search-input');

searchInput.addEventListener("input", () => {
    const value = searchInput.value.toLowerCase();

    document.querySelectorAll('#table-body tr').forEach(row => {
        const name = row.querySelector('.edit-name').value.toLowerCase();

        row.style.display = name.includes(value) ? "" : "none";
    });
});
/* ======================================
  Abrir Editar
========================================= */
function abrirEditar(btn) {
    const row = btn.closest('tr');
    filaEditando = row;

    const nombre = row.querySelector('.edit-name').value;

    const modal = document.getElementById('edit-modal');
    const input = document.getElementById('edit-input');

    input.value = nombre;

    modal.classList.remove('hidden');
    input.focus();
}

function cerrarEditar() {
    document.getElementById('edit-modal').classList.add('hidden');
    filaEditando = null;
}

function guardarEdicion() {
    if (!filaEditando) return;

    const nuevoNombre = document.getElementById('edit-input').value.trim().toUpperCase();

    if (!nuevoNombre) return;

    filaEditando.querySelector('.edit-name').value = nuevoNombre;

    cerrarEditar();
    refrescarUI();
}
/* ======================================
  Evento de Abrir Editar
========================================= */
document.getElementById('edit-modal').addEventListener('click', (e) => {
    if (e.target.id === 'edit-modal') {
        cerrarEditar();
    }
});
/* ======================================
  Guardar Edicion "enter" event
========================================= */
document.getElementById('edit-input').addEventListener('keydown', (e) => {
    if (e.key === "Enter") {
        guardarEdicion();
    }
});
/* =========================
   Arrastrar y ordenar
========================= */
let draggedRow = null;

tableBody.addEventListener("dragstart", (e) => {
    draggedRow = e.target.closest("tr");
    e.target.classList.add("dragging");
});

tableBody.addEventListener("dragend", (e) => {
    e.target.classList.remove("dragging");
    guardarOrden();
    guardarDatos(); // 🔥 FALTABA ESTO
});

tableBody.addEventListener("dragover", (e) => {
    e.preventDefault();

    const afterElement = getDragAfterElement(tableBody, e.clientY);
    const current = draggedRow;

    if (!afterElement) {
        tableBody.appendChild(current);
        return;
    }

    
    const grupoActual = obtenerGrupo(current);
    const grupoDestino = obtenerGrupo(afterElement);

    if (grupoActual !== grupoDestino) {
    current.classList.add("drag-invalid");
    return;
} else {
    current.classList.remove("drag-invalid");
}

    tableBody.insertBefore(current, afterElement);
});

function getDragAfterElement(container, y) {
    const elements = [...container.querySelectorAll("tr:not(.dragging)")];

    return elements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closest.offset) {
            return { offset: offset, element: child };
        } else {
            return closest;
        }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
}
/* =========================
   Guardar Orden
========================= */
function guardarOrden() {
    const order = [];

    document.querySelectorAll('#table-body tr').forEach(row => {
        order.push(row.dataset.id);
    });

    localStorage.setItem("techTrackOrder", JSON.stringify(order));
}
/* =========================
   Obtener grupo
========================= */
function obtenerGrupo(row) {
    const percent = obtenerPorcentaje(row);

    if (row.classList.contains('row-finished')) return 3;
    if (percent >= 75) return 2;
    if (percent >= 1) return 1;
    return 0;
}
/* =========================
   Exportar CSV Equipos
========================= */
function exportarExcel() {
    const tabla = document.getElementById("equipos-table");
    const filas = Array.from(tabla.querySelectorAll("tbody tr"));
    
    const datosExcel = filas.map(row => {
        const checks = row.querySelectorAll('td input[type="checkbox"]:not(.hidden-inv-check)');
        
        // Determinar el texto del estado
        let estadoTexto = "PENDIENTE";
        if (row.classList.contains('row-finished')) {
            estadoTexto = "COMPLETO";
        } else if (row.dataset.state === "reopened") {
            estadoTexto = "REABIERTO";
        }

        // Obtener la nota del equipo (del input oculto que ya tienes en tu HTML)
        const notaEquipo = row.querySelector(".hidden-notes") ? row.querySelector(".hidden-notes").value : "";

        return {
            "ID EQUIPO": row.querySelector(".edit-name").value,
            "PROGRESO": row.querySelector(".progress-text").textContent,
            "ACTUALIZACIONES": checks[0].checked ? "SÍ" : "NO",
            "BIOS UPDATE": checks[1].checked ? "SÍ" : "NO",
            "COSAS C:\\": checks[2].checked ? "SÍ" : "NO",
            "CUENTAS": checks[3].checked ? "SÍ" : "NO",
            "APLICACIONES": checks[4].checked ? "SÍ" : "NO",
            "ESTADO": estadoTexto,
            "NOTAS DEL EQUIPO": notaEquipo
        };
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(datosExcel);

    // Ajuste de anchos de columna (agregamos ancho para la columna de notas)
    const wscols = [
        {wch: 25}, {wch: 12}, {wch: 18}, {wch: 15}, 
        {wch: 12}, {wch: 12}, {wch: 15}, {wch: 15}, {wch: 40}
    ];
    ws['!cols'] = wscols;

    XLSX.utils.book_append_sheet(wb, ws, "Equipos");
    
    const fecha = new Date().toLocaleDateString().replace(/\//g, '-');
    XLSX.writeFile(wb, `Reporte_Equipos_${fecha}.xlsx`);
}
/* =========================
   Exportar TXT Historial
========================= */
function exportarHistorialTXT() {

    const data = JSON.parse(localStorage.getItem('techTrackHistory') || "[]");

    if (!data.length) {
        alert("No hay equipos en el historial");
        return;
    }

    let texto = "=== HISTORIAL DE EQUIPOS ===\n\n";

    data.forEach(item => {

        texto += `==============================\n`;
        texto += `EQUIPO: ${item.name}\n`;
        texto += `FECHA: ${item.fecha}\n`;
        texto += `PROGRESO: ${Math.round(item.progreso)}%\n`;
        texto += `ESTADO: ${item.estado}\n`;
        texto += `INVENTARIADO: ${item.inventariado ? "SI" : "NO"}\n`;

        if (item.faltantes && item.faltantes.length > 0) {
            texto += `\n❌ FALTANTES:\n`;
            item.faltantes.forEach(f => {
                texto += ` - ${f}\n`;
            });
        } else {
            texto += `\n✔ TODOS LOS PROCESOS COMPLETADOS\n`;
        }

        texto += `==============================\n\n`;
    });

    const blob = new Blob([texto], { type: "text/plain" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "Historial_Equipos.txt";
    a.click();

    URL.revokeObjectURL(url);
}
